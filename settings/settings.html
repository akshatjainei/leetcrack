<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LeetCrack Settings</title>
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <div class="container">
    <h1>LeetCrack Settings</h1>

    <div class="form-group">
      <label for="api-key">OpenAI API Key</label>
      <div class="input-row">
        <input
          type="password"
          id="api-key"
          placeholder="sk-..."
          autocomplete="off"
        />
        <button id="toggle-key-btn" class="small-btn" title="Show/Hide">Show</button>
      </div>
      <p class="hint">Your key is stored locally and never leaves your device except for OpenAI API calls.</p>
    </div>

    <div class="form-group">
      <label for="model-select">Model</label>
      <select id="model-select">
        <option value="gpt-4o-mini" selected>gpt-4o-mini (fast, recommended)</option>
        <option value="gpt-4o">gpt-4o (higher quality)</option>
        <option value="gpt-3.5-turbo">gpt-3.5-turbo (cheapest)</option>
      </select>
    </div>

    <div class="button-row">
      <button id="save-btn" class="primary-btn">Save</button>
      <button id="test-btn" class="secondary-btn">Test Connection</button>
    </div>

    <div id="status-toast" hidden></div>
  </div>

  <script src="settings.js"></script>
</body>
</html>
